openapi: "3.0.3"
info:
  title: Operational Grace API
  version: "1.0.0"
  description: >
    Internal domain service API. Owns the reservations and guests domains.
    Exposes property-scoped reservation listing with live/training environment
    isolation via dual database schemas. Not publicly accessible — called only
    by polite-intervention. Permission enforcement delegated to measured-judgement.

servers:
  - url: /

security:
  - BearerAuth: []

paths:
  /internal/ping:
    get:
      operationId: internalPing
      x-auth-mode: none
      x-tenant-scope: none
      x-public-surface: false
      x-error-envelope: not_applicable
      summary: Internal connectivity ping
      tags: [Internal]
      security: []
      responses:
        "200":
          description: Service is reachable
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /health/live:
    get:
      operationId: healthLive
      x-auth-mode: none
      x-tenant-scope: none
      x-public-surface: false
      x-error-envelope: not_applicable
      summary: Liveness probe
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service process is running
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]

  /health/ready:
    get:
      operationId: healthReady
      x-auth-mode: none
      x-tenant-scope: none
      x-public-surface: false
      x-error-envelope: not_applicable
      summary: Readiness probe
      description: >
        Returns ready when both live and training database schema connections
        are healthy. Returns 503 if either pool is unreachable.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ready]
        "503":
          description: Service not ready
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [not_ready]

  /live/properties/{property_uuid}/reservations:
    get:
      operationId: listLivePropertyReservations
      x-auth-mode: bearer
      x-tenant-scope: property
      x-public-surface: false
      x-error-envelope: components/errors.yaml#/components/schemas/ErrorEnvelope
      summary: List live reservations for a property
      description: >
        Returns a paginated list of reservation UUIDs for the specified property
        from the live (operational) schema. Actor must hold reservations.view
        for the property. All denial conditions (property not found, out of
        scope, no permission) return 404 to prevent information leakage.
      tags: [Reservations]
      parameters:
        - $ref: "#/components/parameters/PropertyUuid"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorUserUuid"
        - $ref: "#/components/parameters/OrganisationUuid"
        - $ref: "#/components/parameters/PropertyUuidHeader"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          $ref: "#/components/responses/ReservationListResponse"
        "400":
          $ref: "components/errors.yaml#/components/responses/BadRequest"
        "401":
          $ref: "components/errors.yaml#/components/responses/Unauthenticated"
        "404":
          $ref: "components/errors.yaml#/components/responses/NotFound"
        "502":
          $ref: "components/errors.yaml#/components/responses/BadGateway"
        "500":
          $ref: "components/errors.yaml#/components/responses/InternalError"
    post:
      operationId: createLiveReservation
      x-auth-mode: bearer
      x-tenant-scope: property
      x-public-surface: false
      x-error-envelope: components/errors.yaml#/components/schemas/ErrorEnvelope
      summary: Create a reservation in the live environment
      description: >
        Creates a reservation with one or more stays in the live schema. The
        reservation_uuid is client-supplied for idempotence — repeat requests
        with the same reservation_uuid are safe. Requires reservations.create
        permission for the property.
      tags: [Reservations]
      parameters:
        - $ref: "#/components/parameters/PropertyUuid"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorUserUuid"
        - $ref: "#/components/parameters/OrganisationUuid"
        - $ref: "#/components/parameters/PropertyUuidHeader"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationBody"
      responses:
        "201":
          $ref: "#/components/responses/ReservationCreatedResponse"
        "400":
          $ref: "components/errors.yaml#/components/responses/BadRequest"
        "401":
          $ref: "components/errors.yaml#/components/responses/Unauthenticated"
        "404":
          $ref: "components/errors.yaml#/components/responses/NotFound"
        "500":
          $ref: "components/errors.yaml#/components/responses/InternalError"

  /training/properties/{property_uuid}/reservations:
    get:
      operationId: listTrainingPropertyReservations
      x-auth-mode: bearer
      x-tenant-scope: property
      x-public-surface: false
      x-error-envelope: components/errors.yaml#/components/schemas/ErrorEnvelope
      summary: List training reservations for a property
      description: >
        Returns a paginated list of reservation UUIDs for the specified property
        from the training schema. Identical behaviour to the live endpoint;
        data is fully isolated between schemas.
      tags: [Reservations]
      parameters:
        - $ref: "#/components/parameters/PropertyUuid"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorUserUuid"
        - $ref: "#/components/parameters/OrganisationUuid"
        - $ref: "#/components/parameters/PropertyUuidHeader"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          $ref: "#/components/responses/ReservationListResponse"
        "400":
          $ref: "components/errors.yaml#/components/responses/BadRequest"
        "401":
          $ref: "components/errors.yaml#/components/responses/Unauthenticated"
        "404":
          $ref: "components/errors.yaml#/components/responses/NotFound"
        "502":
          $ref: "components/errors.yaml#/components/responses/BadGateway"
        "500":
          $ref: "components/errors.yaml#/components/responses/InternalError"
    post:
      operationId: createTrainingReservation
      x-auth-mode: bearer
      x-tenant-scope: property
      x-public-surface: false
      x-error-envelope: components/errors.yaml#/components/schemas/ErrorEnvelope
      summary: Create a reservation in the training environment
      description: >
        Creates a reservation with one or more stays in the training schema.
        Identical behaviour to the live endpoint; data is fully isolated
        between schemas.
      tags: [Reservations]
      parameters:
        - $ref: "#/components/parameters/PropertyUuid"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorUserUuid"
        - $ref: "#/components/parameters/OrganisationUuid"
        - $ref: "#/components/parameters/PropertyUuidHeader"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationBody"
      responses:
        "201":
          $ref: "#/components/responses/ReservationCreatedResponse"
        "400":
          $ref: "components/errors.yaml#/components/responses/BadRequest"
        "401":
          $ref: "components/errors.yaml#/components/responses/Unauthenticated"
        "404":
          $ref: "components/errors.yaml#/components/responses/NotFound"
        "500":
          $ref: "components/errors.yaml#/components/responses/InternalError"

  /live/properties/{property_uuid}/holds:
    post:
      operationId: createLiveHold
      x-auth-mode: bearer
      x-tenant-scope: property
      x-public-surface: false
      x-error-envelope: components/errors.yaml#/components/schemas/ErrorEnvelope
      summary: Create a hold in the live environment
      description: >
        Creates a time-bound inventory hold in the live schema. The hold_uuid is
        client-supplied for idempotence — repeat requests with the same hold_uuid
        are safe. Requires reservations.create permission for the property.
      tags: [Holds]
      parameters:
        - $ref: "#/components/parameters/PropertyUuid"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorUserUuid"
        - $ref: "#/components/parameters/OrganisationUuid"
        - $ref: "#/components/parameters/PropertyUuidHeader"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHoldBody"
      responses:
        "201":
          $ref: "#/components/responses/HoldCreatedResponse"
        "400":
          $ref: "components/errors.yaml#/components/responses/BadRequest"
        "401":
          $ref: "components/errors.yaml#/components/responses/Unauthenticated"
        "404":
          $ref: "components/errors.yaml#/components/responses/NotFound"
        "500":
          $ref: "components/errors.yaml#/components/responses/InternalError"

  /training/properties/{property_uuid}/holds:
    post:
      operationId: createTrainingHold
      x-auth-mode: bearer
      x-tenant-scope: property
      x-public-surface: false
      x-error-envelope: components/errors.yaml#/components/schemas/ErrorEnvelope
      summary: Create a hold in the training environment
      description: >
        Creates a time-bound inventory hold in the training schema. Identical
        behaviour to the live endpoint; data is fully isolated between schemas.
      tags: [Holds]
      parameters:
        - $ref: "#/components/parameters/PropertyUuid"
        - $ref: "#/components/parameters/ActorType"
        - $ref: "#/components/parameters/ActorUserUuid"
        - $ref: "#/components/parameters/OrganisationUuid"
        - $ref: "#/components/parameters/PropertyUuidHeader"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHoldBody"
      responses:
        "201":
          $ref: "#/components/responses/HoldCreatedResponse"
        "400":
          $ref: "components/errors.yaml#/components/responses/BadRequest"
        "401":
          $ref: "components/errors.yaml#/components/responses/Unauthenticated"
        "404":
          $ref: "components/errors.yaml#/components/responses/NotFound"
        "500":
          $ref: "components/errors.yaml#/components/responses/InternalError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PropertyUuid:
      name: property_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the property to list reservations for

    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque HMAC-signed pagination cursor from a previous response

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      description: Maximum number of results to return

    ActorType:
      name: X-Actor-Type
      in: header
      required: true
      schema:
        type: string
        enum: [user]
      description: Delegated actor type forwarded by polite-intervention

    ActorUserUuid:
      name: X-Actor-User-Uuid
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Delegated actor user UUID forwarded by polite-intervention

    OrganisationUuid:
      name: X-Organisation-Uuid
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Organisation UUID forwarded by polite-intervention

    PropertyUuidHeader:
      name: X-Property-Uuid
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Property UUID forwarded by polite-intervention (canonical delegated context header)

    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
      description: Correlation ID for distributed tracing

  schemas:
    CreateReservationBody:
      type: object
      required: [reservation_uuid, guest_name, check_in, check_out, stays]
      properties:
        reservation_uuid:
          type: string
          format: uuid
          description: Client-supplied UUID for idempotence — safe to retry with the same value.
        guest_name:
          type: string
          minLength: 1
        check_in:
          type: string
          format: date
          description: >
            Reservation arrival date. Start of the overall booking envelope. Inclusive.
            Must be strictly before check_out.
        check_out:
          type: string
          format: date
          description: >
            Reservation departure date. End of the overall booking envelope. Exclusive.
            Must be strictly after check_in.
        stays:
          type: array
          minItems: 1
          description: >
            Allocation segments for this reservation. Each stay records the nights
            assigned to a particular accommodation option type. Stays do not need to
            be contiguous but all stay ranges must lie within the reservation
            check_in/check_out envelope.
          items:
            type: object
            required: [accommodation_option_type_uuid, start_date, end_date]
            properties:
              accommodation_option_type_uuid:
                type: string
                format: uuid
              accommodation_option_uuid:
                type: string
                format: uuid
                nullable: true
                description: >
                  Optional allocation to a concrete sellable option. Null means the
                  stay is unallocated.
              accommodation_unit_uuid:
                type: string
                format: uuid
                nullable: true
                description: >
                  Optional allocation to a specific physical accommodation unit.
                  Applicable for non-composite option types. Null means no specific
                  unit has been assigned.
              start_date:
                type: string
                format: date
                description: Start of this stay segment. Inclusive. Must be >= reservation check_in.
              end_date:
                type: string
                format: date
                description: End of this stay segment. Exclusive. Must be <= reservation check_out.
              adult_count:
                type: integer
                nullable: true
                description: >
                  Optional number of adults assigned to this stay segment. Null means
                  no adult count has been specified.

    CreateHoldBody:
      type: object
      required: [hold_uuid, expires_at, accommodation_option_type_uuid, check_in, check_out]
      properties:
        hold_uuid:
          type: string
          format: uuid
          description: Client-supplied UUID for idempotence — safe to retry with the same value.
        expires_at:
          type: string
          format: date-time
        accommodation_option_type_uuid:
          type: string
          format: uuid
        accommodation_option_uuid:
          type: string
          format: uuid
          nullable: true
        check_in:
          type: string
          format: date
        check_out:
          type: string
          format: date

  responses:
    ReservationListResponse:
      description: Paginated list of reservation UUIDs
      content:
        application/json:
          schema:
            type: object
            required: [reservations, next_cursor]
            properties:
              reservations:
                type: array
                items:
                  type: object
                  required: [reservation_uuid]
                  properties:
                    reservation_uuid:
                      type: string
                      format: uuid
              next_cursor:
                type: string
                nullable: true
                description: Opaque cursor for the next page; null if no further results

    ReservationCreatedResponse:
      description: Reservation created
      content:
        application/json:
          schema:
            type: object
            required: [reservation, stays, was_existing]
            properties:
              was_existing:
                type: boolean
                description: True if the reservation already existed (idempotent replay).
              reservation:
                type: object
                required: [uuid, property_uuid, guest_name, check_in, check_out, created_at]
                properties:
                  uuid:
                    type: string
                    format: uuid
                  property_uuid:
                    type: string
                    format: uuid
                  guest_name:
                    type: string
                  check_in:
                    type: string
                    format: date
                  check_out:
                    type: string
                    format: date
                  created_at:
                    type: string
                    format: date-time
              stays:
                type: array
                items:
                  type: object
                  required: [uuid, accommodation_option_type_uuid, start_date, end_date, created_at]
                  properties:
                    uuid:
                      type: string
                      format: uuid
                    accommodation_option_type_uuid:
                      type: string
                      format: uuid
                    accommodation_option_uuid:
                      type: string
                      format: uuid
                      nullable: true
                    accommodation_unit_uuid:
                      type: string
                      format: uuid
                      nullable: true
                      description: Specific physical unit allocated for this stay, or null if unassigned.
                    start_date:
                      type: string
                      format: date
                    end_date:
                      type: string
                      format: date
                    adult_count:
                      type: integer
                      nullable: true
                      description: Number of adults for this stay segment, or null if not specified.
                    created_at:
                      type: string
                      format: date-time

    HoldCreatedResponse:
      description: Hold created
      content:
        application/json:
          schema:
            type: object
            required: [hold]
            properties:
              hold:
                type: object
                required: [uuid, property_uuid, accommodation_option_type_uuid, check_in, check_out, expires_at]
                properties:
                  uuid:
                    type: string
                    format: uuid
                  property_uuid:
                    type: string
                    format: uuid
                  accommodation_option_type_uuid:
                    type: string
                    format: uuid
                  accommodation_option_uuid:
                    type: string
                    format: uuid
                    nullable: true
                  check_in:
                    type: string
                    format: date
                  check_out:
                    type: string
                    format: date
                  expires_at:
                    type: string
                    format: date-time
