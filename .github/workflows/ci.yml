name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: operational_grace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d operational_grace_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/operational_grace_test
      DATABASE_URL_DIRECT: postgresql://ci:ci@localhost:5432/operational_grace_test
      PG_SSL: "false"
      DB_POOL_SIZE: "10"
      DB_CONNECTION_TIMEOUT_MS: "5000"
      DB_IDLE_TIMEOUT_MS: "30000"

      AUTH0_DOMAIN: test.auth0.com
      AUTH0_ISSUER: https://test.auth0.com/
      AUTH0_AUDIENCE: https://api.test/operational-grace
      AUTH0_ALLOWED_AZP: test-pi-m2m-client-id
      AUTH0_JWKS_URI: http://127.0.0.1:19999/.well-known/jwks.json

      CURSOR_HMAC_SECRET: ci-cursor-hmac-secret

      MEASURED_JUDGEMENT_BASE_URL: https://measured-judgement.internal.test
      AUTH0_M2M_AUDIENCE: https://api.test/measured-judgement
      AUTH0_M2M_CLIENT_ID: ci-og-m2m-client-id
      AUTH0_M2M_CLIENT_SECRET: ci-og-m2m-client-secret
      AUTH0_TOKEN_URL: https://test.auth0.com/oauth/token

      LOG_LEVEL: silent
      OTEL_EXPORTER_OTLP_ENDPOINT: ""

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run ci
