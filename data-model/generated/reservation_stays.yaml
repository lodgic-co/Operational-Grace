id: reservation_stays
entity_name: reservation_stays
owning_service: operational-grace
persistence_object: operational_grace.reservation_stays
tenant_scope: property
mutability: immutable
primary_key: [id]
foreign_keys:
  - columns: [reservation_id]
    references: reservations(id)
    on_delete: CASCADE
    notes: Local FK within the same schema — stays are owned by their reservation.
unique_constraints:
  - [uuid]
    name: reservation_stays_uuid_key
table_constraints:
  - name: reservation_stays_end_date_after_start_date
    definition: CHECK (end_date > start_date)
indexes:
  - name: reservation_stays_uuid_idx
    columns: [uuid]
    unique: true
  - name: reservation_stays_reservation_id_idx
    columns: [reservation_id]
fields:
  - name: id
    type: integer
    nullable: false
    generated: GENERATED ALWAYS AS IDENTITY
    notes: Internal surrogate key. Never exposed in public responses.
  - name: uuid
    type: uuid
    nullable: false
    public_identifier: true
    default: gen_random_uuid()
    notes: Server-generated UUID. Not client-supplied; no idempotence guarantee
      per stay. Idempotence is managed at the reservation level via
      CreateReservationWithStays.
  - name: reservation_id
    type: integer
    nullable: false
    notes: FK to reservations(id). Links this stay to its parent reservation.
  - name: accommodation_option_type_uuid
    type: uuid
    nullable: false
    notes: >
      Cross-service reference to considered-response's
      accommodation_option_types. No local FK constraint per I16
      external_reference_rule.
  - name: accommodation_option_uuid
    type: uuid
    nullable: true
    notes: >
      Optional cross-service reference to a concrete sellable option in
      considered-response. NULL means the stay is not yet allocated to a
      specific option. No local FK constraint per I16.
  - name: start_date
    type: date
    nullable: false
    notes: >
      Start of this stay segment. Inclusive. Must be >= reservation.check_in.
      Renamed from check_in in migration 202603160105. Date semantics: start
      inclusive, end exclusive.
  - name: end_date
    type: date
    nullable: false
    notes: >
      End of this stay segment. Exclusive. Must be <= reservation.check_out.
      Renamed from check_out in migration 202603160105.
    constraints:
      - CHECK (end_date > start_date)
  - name: adult_count
    type: integer
    nullable: true
    notes: >
      Optional number of adults assigned to this stay segment. NULL means no
      adult count has been specified for this allocation. Added in migration
      202603170001. No minimum constraint enforced at the database level.
  - name: created_at
    type: timestamptz
    nullable: false
    default: now()
  - name: updated_at
    type: timestamptz
    nullable: false
    default: now()
triggers:
  - name: set_reservation_stays_updated_at
    event: BEFORE UPDATE
    for_each: ROW
    function: set_updated_at()
notes:
  - This table exists in both operational_grace and
    operational_grace_training schemas with identical structure.
  - accommodation_option_type_uuid and accommodation_option_uuid are
    conceptual cross-service references to considered-response. No database
    FK constraints across service boundaries (I16 external_reference_rule).
  - Stays are created atomically with their parent reservation by
    CreateReservationWithStays. A stay cannot exist without a reservation.
  - start_date/end_date represent the nights assigned to a specific
    accommodation allocation segment. They are distinct from the
    reservation-level check_in/check_out envelope. Each stay's range
    must lie within the reservation envelope but stays do not need
    to be contiguous. Column names were originally check_in/check_out
    (renamed in migration 202603160105 to reflect allocation semantics
    rather than guest-event semantics).
