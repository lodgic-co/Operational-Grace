procedure_name: CreateReservationWithStays
procedure_kind: domain
identifier_mode: boundary_resolving
owning_service: operational-grace
purpose: >
  Orchestrating create procedure that owns the full transaction boundary
  for a reservation and all its stays. Calls CreateReservation and
  CreateReservationStay as sub-procedures within a single transaction.

  Idempotence: if was_existing=true (reservation UUID already existed),
  the existing reservation and its stays are returned without inserting
  new rows. BEGIN → CreateReservation → N × CreateReservationStay → COMMIT.
  Any failure → ROLLBACK. Partial writes are not possible.

  Implements the create procedure taxonomy per I16: orchestrating create
  that owns the transaction, client-supplied UUID for idempotence.
source_files:
  - src/domain/procedures.ts
used_by:
  - src/routes/reservations.ts
caller_context: >
  Called by the POST /properties/:property_uuid/reservations route handler
  after delegated actor validation and AssertPropertyPermission have passed.
inputs:
  - environment ('live' | 'training' — TypeScript literal, not request-derived)
  - livePool (Pool)
  - trainingPool (Pool)
  - reservationUuid (string UUID — client-supplied idempotence key)
  - propertyUuid (string UUID — tenant scoping identifier)
  - guestName (string — non-empty)
  - checkIn (string ISO date YYYY-MM-DD — reservation booking envelope start, inclusive)
  - checkOut (string ISO date YYYY-MM-DD — reservation booking envelope end, exclusive)
  - stays (StayInput[] — array of stay descriptors, min length 1; each with
    accommodation_option_type_uuid, accommodation_option_uuid nullable,
    accommodation_unit_uuid nullable UUID, start_date, end_date,
    adult_count nullable integer)
outputs:
  - CreateReservationResult (was_existing: boolean, reservation: { uuid,
    property_uuid, guest_name, check_in, check_out, created_at },
    stays: StayRow[])
preconditions:
  - stays must be non-empty (enforced by pre-check; InvalidRequest if empty).
  - checkOut must be strictly greater than checkIn (reservation envelope).
  - All stays must have end_date > start_date.
  - All stays must have start_date >= checkIn and end_date <= checkOut
    (stay ranges must lie within the reservation envelope).
  - No active transaction on entry — this procedure opens its own.
decision_logic:
  - Validate stays.length >= 1; throw InvalidRequest if empty.
  - Validate checkOut > checkIn; throw InvalidRequest if violated.
  - For each stay: validate end_date > start_date; throw InvalidRequest if
    violated.
  - For each stay: validate start_date >= checkIn and end_date <= checkOut;
    throw InvalidRequest if any stay falls outside the reservation envelope.
  - Call ResolveEnvironmentSchema to obtain the environment-scoped pool.
  - Acquire a connection and BEGIN.
  - Call CreateReservation(trx, reservationUuid, propertyUuid, guestName,
    checkIn, checkOut).
  - If was_existing=true: SELECT existing stays from reservation_stays by
    reservation_id including accommodation_unit_uuid, start_date, end_date,
    and adult_count; skip stay inserts.
  - If was_existing=false: call CreateReservationStay once per stay input
    passing accommodation_unit_uuid, start_date, end_date, and adult_count.
  - COMMIT; return { was_existing, reservation, stays }.
  - On any error: ROLLBACK and re-throw.
relationship_traversal:
  - ResolveEnvironmentSchema — selects pool by environment literal. No DB.
  - CreateReservation — INSERT reservations ON CONFLICT (uuid) DO NOTHING,
    then SELECT. Constraining identifier: reservationUuid (UNIQUE).
  - CreateReservationStay — INSERT reservation_stays N times within the
    same transaction. reservation_id FK links stays to the reservation.
  - Idempotent replay — SELECT reservation_stays WHERE reservation_id = id
    to return existing stays without re-inserting.
scoping_constraints:
  - Tenant scope is property via propertyUuid (passed through to reservations
    table; no local property resolution performed here).
  - Environment scope is determined by ResolveEnvironmentSchema from the
    TypeScript literal — not from any request input.
set_semantics:
  - Atomically creates one reservation and N stays in a single transaction.
  - Idempotent: repeated calls with the same reservationUuid return the
    same reservation and its original stays.
error_behaviour:
  - invalid_request (400) — empty stays array.
  - invalid_request (400) — reservation checkOut <= checkIn.
  - invalid_request (400) — any stay end_date <= start_date.
  - invalid_request (400) — any stay start_date < reservation checkIn.
  - invalid_request (400) — any stay end_date > reservation checkOut.
  - Database errors → ROLLBACK and re-throw as internal_error.
data_dependencies:
  - operational_grace.reservations (via CreateReservation)
  - operational_grace.reservation_stays (via CreateReservationStay)
side_effects: >
  Inserts one reservation row and N stay rows atomically in a single
  transaction, or zero rows on idempotent replay.
invariants:
  - A reservation and all its stays are created atomically. Partial writes
    are not possible.
  - Client-supplied UUID idempotence: repeated calls with the same
    reservationUuid always return the same reservation.
  - reservation.check_in/check_out forms the booking envelope; all stay
    start_date/end_date ranges must lie within this envelope.
  - Stay ranges do not need to be contiguous — gaps are permitted.
  - Date semantics: start inclusive, end exclusive throughout.
  - accommodation_unit_uuid is optional per stay; null means no specific
    physical unit has been assigned. Applicable for non-composite option types.
  - adult_count is optional per stay; null means no adult count specified.
    No minimum or maximum value is enforced at the procedure level.
default_outcome: >
  Returns the CreateReservationResult with the reservation and its stays.
