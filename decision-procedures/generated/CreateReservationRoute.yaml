procedure_name: CreateReservationRoute
procedure_kind: route_orchestration
identifier_mode: boundary_resolving
owning_service: operational-grace
naming_deviation_note: >
  Uses 'Create' prefix as a route orchestration procedure. Route orchestration
  procedures are exempt from the single governed naming verb requirement per
  the decision-procedure-generation-model.
purpose: >
  HTTP route behaviour for POST /{env}/properties/:property_uuid/reservations.
  Validates input, enforces delegated actor context and property-scoped
  permission, and delegates to CreateReservationWithStays. Returns 201 on
  success.

  The environment (live or training) is a TypeScript literal bound at route
  registration time — not parsed at request time — per M37/I15.
source_files:
  - src/routes/reservations.ts
  - src/domain/procedures.ts
used_by:
  - src/http/app.ts (registered twice — once under /live and once under
    /training prefix with hardcoded environment literals)
caller_context: >
  Called by polite-intervention as the downstream domain authority for
  reservation creation.
inputs:
  - property_uuid (path parameter UUID)
  - environment ('live' | 'training' — literal bound at registration)
  - reservation_uuid (body UUID — client idempotence key)
  - guest_name (body string, min length 1)
  - check_in (body ISO date YYYY-MM-DD — reservation envelope start, inclusive)
  - check_out (body ISO date YYYY-MM-DD — reservation envelope end, exclusive)
  - stays (body array, min 1 item, each with accommodation_option_type_uuid,
    start_date, end_date, optional accommodation_option_uuid)
  - X-Actor-User-Uuid, X-Organisation-Uuid, X-Property-Uuid (delegated actor
    headers)
  - X-Request-Id (optional)
outputs:
  - 201 with CreateReservationResult body (was_existing, reservation, stays)
preconditions:
  - X-Property-Uuid must be present and match property_uuid path parameter.
  - stays must be non-empty.
  - check_out must be strictly greater than check_in.
  - Each stay end_date must be strictly greater than start_date.
  - Each stay range must lie within the reservation check_in/check_out envelope.
decision_logic:
  - Validate property_uuid via Zod paramsSchema.
  - Validate body via createReservationBodySchema (requires check_in, check_out
    at top level; stays with start_date/end_date per item).
  - Parse delegated actor; if null, throw InvalidRequest.
  - Validate X-Property-Uuid matches property_uuid.
  - Set request telemetry fields.
  - Call AssertPropertyPermission with 'reservations.create'.
  - Map body stays to StayInput[].
  - Call CreateReservationWithStays; return 201 with the result.
error_behaviour:
  - invalid_request (400) — param/body validation failure or missing
    X-Property-Uuid.
  - not_found (404) — AssertPropertyPermission denial (non-leakage).
  - bad_gateway (502) — measured-judgement unreachable.
  - internal_error (500) — unexpected database error.
data_dependencies:
  - Delegated to underlying procedures.
side_effects: >
  Inserts one reservation and N stays atomically on success (or zero on
  idempotent replay).
