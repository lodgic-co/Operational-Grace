procedure_name: CreateReservationStay
procedure_kind: domain
identifier_mode: internal_only
owning_service: operational-grace
purpose: >
  Insert one reservation_stay row within a caller-supplied transaction.
  The stay UUID is generated server-side via gen_random_uuid() at insert
  time — this procedure does not accept a client-supplied UUID and is
  not individually idempotent. Does not own its own transaction.

  Implements the create procedure taxonomy per I16: new entity creation,
  accepts caller-supplied transaction, server-side UUID generation.
source_files:
  - src/domain/procedures.ts
used_by:
  - CreateReservationWithStays (called within its transaction, once per stay)
caller_context: >
  Called exclusively from CreateReservationWithStays inside an active
  transaction, once per element of the stays input array. Never called
  directly by route handlers.
inputs:
  - trx (PoolClient — an active transaction connection)
  - reservationId (integer — internal primary key of the parent reservation)
  - accommodationOptionTypeUuid (string UUID — cross-service reference to
    considered-response; no local FK constraint per I16)
  - accommodationOptionUuid (string UUID | null — optional concrete option
    allocation; null means unallocated)
  - startDate (string ISO date YYYY-MM-DD — stay segment start, inclusive;
    must be >= reservation check_in, validated upstream)
  - endDate (string ISO date YYYY-MM-DD — stay segment end, exclusive;
    must be > startDate and <= reservation check_out, validated upstream)
  - adultCount (integer | null — optional number of adults for this stay
    segment; null means no adult count specified)
outputs:
  - StayRow (uuid, reservation_id, accommodation_option_type_uuid,
    accommodation_option_uuid, start_date, end_date, adult_count, created_at)
preconditions:
  - A transaction must be active on trx.
  - reservationId must be the internal primary key of an existing reservation.
  - endDate must be strictly greater than startDate (enforced upstream).
  - startDate >= reservation.check_in and endDate <= reservation.check_out
    (enforced upstream by CreateReservationWithStays).
decision_logic:
  - INSERT INTO reservation_stays (reservation_id, accommodation_option_type_uuid,
    accommodation_option_uuid, start_date, end_date, adult_count)
    VALUES ($1, $2::uuid, $3, $4::date, $5::date, $6) RETURNING
    all fields including server-generated uuid, adult_count, and created_at.
  - Return the RETURNING row as StayRow.
relationship_traversal:
  - INSERT into reservation_stays with reservation_id FK to reservations(id).
  - uuid generated by gen_random_uuid() at insert time.
scoping_constraints:
  - Scoped to the parent reservation via reservation_id.
set_semantics:
  - Each call creates exactly one new reservation_stays row with a unique
    server-generated uuid.
error_behaviour:
  - Database errors propagate to CreateReservationWithStays which handles
    ROLLBACK.
data_dependencies:
  - operational_grace.reservation_stays (write — INSERT)
side_effects: >
  Inserts exactly one row into reservation_stays.
invariants:
  - accommodation_option_type_uuid and accommodation_option_uuid are
    conceptual cross-service references to considered-response. No local
    foreign key constraints (I16 external_reference_rule).
  - Server-side UUID generation means this procedure is not individually
    idempotent; the caller (CreateReservationWithStays) handles idempotence
    at the reservation level.
default_outcome: >
  Returns the newly inserted StayRow.
